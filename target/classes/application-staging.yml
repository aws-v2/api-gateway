server:
  port: ${STAGING_SERVER_PORT:8080}

api:
  version: ${STAGING_API_VERSION:/api/v1}

frontend:
  url: ${STAGING_FRONTEND_URL:http://frontend:5173}

jwt:
  secret: ${STAGING_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

nats:
  url: ${STAGING_NATS_URL:nats://nats-staging:4222}
  username: ${STAGING_NATS_USERNAME:auth-server}
  password: ${STAGING_NATS_PASSWORD:auth-secret}



spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        - name: Retry
          args:
            retries: 3
            methods: GET,POST
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: false

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${STAGING_EUREKA_URL:http://discovery-server-staging:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

management:
  endpoints:
    web:
      exposure:
        include: refresh

logging:
  level:
    root: INFO
    "[com.netflix.eureka]": INFO
    "[com.netflix.discovery]": INFO

