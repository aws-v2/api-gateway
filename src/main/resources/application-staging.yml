server:
  port: 8080

api:
  version: /api/v1

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: auth-redis
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        - name: Retry
          args:
            retries: 3
            methods: GET,POST
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms
              factor: 2
              basedOnPreviousValue: false

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

nats:
  url: nats://nats:4222
  username: ${STAGING_NATS_USERNAME:auth-server}
  password: ${STAGING_NATS_PASSWORD:auth-secret}

jwt:
  secret: ${STAGING_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: refresh

frontend:
  url: ${STAGING_FRONTEND_URL:http://frontend:5173}
