name: Prod deployment

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  prod-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test

  prod-build-and-push:
    runs-on: ubuntu-latest
    needs: prod-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/api-gateway:prod
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

  prod-deploy:
    needs: prod-build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Production via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create --driver overlay prod-overlay-net || true

            docker pull qarani/api-gateway:prod

            # remove old service if exists
            docker service rm api-gateway-prod || true

            # deploy new swarm service
            docker service create \
              --name api-gateway-prod \
              --network prod-overlay-net \
              --publish published=8080,target=8080 \
              --env SPRING_PROFILES_ACTIVE=prod \
              --env PROD_SERVER_PORT=8080 \
              --env PROD_API_VERSION=/api/v1 \
              --env PROD_FRONTEND_URL=http://frontend:5173 \
              --env PROD_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 \
              --env PROD_NATS_URL=nats://nats-prod:4222 \
              --env PROD_NATS_USERNAME=nats-prod-user \
              --env PROD_NATS_PASSWORD=nats-prod-password \
              --env PROD_EUREKA_URL=http://discovery-server-prod:8761/eureka/ \
              qarani/api-gateway:prod



