name: Prod deployment

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/api-gateway:prod
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          script: |
            echo "${{ secrets.API_GATEWAY_PROD_ENV }}" > /home/ubuntu/.api-gateway-prod.env
            docker network create aws-prod-network || true
            docker pull qarani/api-gateway:prod
            docker stop api-gateway || true
            docker rm api-gateway || true
            docker run -d --name api-gateway --network aws-prod-network --env-file /home/ubuntu/.api-gateway-prod.env -p 8080:8080 qarani/api-gateway:prod




