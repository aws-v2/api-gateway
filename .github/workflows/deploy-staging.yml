name: Staging Deployment

on:
  push:
    branches: [ "staging" ]
  pull_request:
    branches: [ "staging" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  staging-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean
  
        
  staging-build-and-push:
    needs: staging-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/api-gateway:staging
        tags: qarani/api-gateway:staging-${{ github.sha }}
        build-args: |
          SPRING_PROFILES_ACTIVE=staging

  staging-deploy:
    needs: staging-build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale.
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull qarani/api-gateway:staging-${{ github.sha }}
            docker stop api-gateway-staging || true
            docker rm api-gateway-staging || true
            docker run -d \
              --name api-gateway-staging \
              --network aws-staging-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=staging \
              -e STAGING_SERVER_PORT=8080 \
              -e STAGING_API_VERSION=/api/v1 \
              -e STAGING_FRONTEND_URL=http://frontend:5173 \
              -e STAGING_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 \
              -e STAGING_NATS_URL=nats://nats-staging:4222 \
              -e STAGING_NATS_USERNAME=nats-staging-user \
              -e STAGING_NATS_PASSWORD=nats-staging-password \
              -e STAGING_API_KEY_SECRET=your-strong-random-secret-here \
              -e STAGING_EUREKA_URL=http://discovery-server-staging:8761/eureka/ \
              qarani/api-gateway:staging-${{ github.sha }}

  staging-open-pr-to-main:
    if: github.event_name == 'push'
    needs: staging-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR staging → main...
        run: |
          if gh pr list --base main --head staging --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base main \
              --head staging \
              --title "chore: promote staging → main" \
              --body "✅ Staging deployment succeeded. Auto-generated PR for production release."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}