name: CI - Run Tests

on:
  push:
    branches: [ "dev" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven: true

    - name: Run Tests
      run: mvn test

    - name: Create Pull Request to Main
      if: success()  # Only run if tests pass
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Auto PR: Merge dev into main after passing tests"
        branch: main
        base: main
        title: "Merge dev into main (auto PR)"
        body: "This PR is automatically created after CI tests passed on dev."
